services:
  image-transformer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image-transformer-dev
    working_dir: /workspace
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -XX:+UseContainerSupport
      - GRADLE_USER_HOME=/gradle-cache
    volumes:
      - .:/workspace
      - gradle-cache:/gradle-cache

volumes:
  gradle-cache:
