services:
  image-transformer:
    build:
      context: ../../../../
      dockerfile: modules/uploads/image-transformer/docker/Dockerfile
    working_dir: /workspace
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - JAVA_OPTS=-Xmx512m -XX:+UseContainerSupport
      - GRADLE_USER_HOME=/gradle-cache
    volumes:
      - ../../../../:/workspace
      - gradle-cache:/gradle-cache
      - gradle-project-cache:/gradle-project-cache
    command: ["./gradlew", "--no-daemon", "--project-cache-dir=/gradle-project-cache", ":image-transformer:integrationTest"]

volumes:
  gradle-cache:
  gradle-project-cache:
